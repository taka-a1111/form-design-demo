<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ドトールコーヒー＆スイーツセレクション 注文フォーム</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #fff;
      color: #111;
      font-family: "メイリオ", Meiryo, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      font-size: 12px;
      line-height: 1.5;
    }

    .product-detail {
      width: 715px;
      max-width: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 315px 1fr;
      gap: 24px;
      align-items: start;
    }

    .product-gallery {
      padding-top: 4px;
    }

    .static-product-image {
      display: block;
      width: 293px;
      max-width: 100%;
      height: auto;
    }

    .product-info {
      min-width: 0;
    }

    .product-title {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
    }

    .price-area {
      margin-bottom: 12px;
    }

    .price-main-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-bottom: 6px;
    }

    .price-label {
      color: #222;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
    }

    .price-main-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .price-amount {
      color: #b52a1f;
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: .01em;
      white-space: nowrap;
    }

    .price-tax {
      color: #b52a1f;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
      margin-bottom: 2px;
    }

    .price-off-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 28px;
      padding: 0 10px;
      border-radius: 4px;
      background: #b52a1f;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      margin-bottom: 1px;
    }

    .price-sub-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .regular-label {
      color: #666;
      font-size: 11px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .regular-price {
      color: #8d8d8d;
      font-size: 11px;
      line-height: 1.2;
      text-decoration: line-through;
      white-space: nowrap;
    }

    .order-panel {
      width: 100%;
      padding: 9px 11px 10px;
      border: 1px solid #dcc7b4;
      border-radius: 8px;
      background: #F6EFE8;
    }

    .order-panel p {
      margin: 0;
    }

    .form-group {
      margin-bottom: 9px;
    }

    .form-group:last-of-type {
      margin-bottom: 8px;
    }

    .group-title {
      margin-bottom: 3px;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: .01em;
    }

    .group-note {
      margin-bottom: 4px;
      font-size: 10px;
      line-height: 1.32;
      color: #222;
    }

    .order-panel select,
    .order-panel input[type="text"] {
      width: 100%;
      height: 28px;
      padding: 0 9px;
      border: 1px solid #9ca4b0;
      border-radius: 5px;
      background: #fff;
      color: #111;
      font: inherit;
      font-size: 10px;
      line-height: 28px;
      outline: none;
      appearance: auto;
      -webkit-appearance: menulist;
    }

    .name-input {
      max-width: 165px;
      -webkit-appearance: none;
      appearance: none;
    }

    .order-panel input::placeholder {
      color: #7c7c7c;
      opacity: 1;
    }

    .bottom-note {
      margin: 0 0 10px !important;
      font-size: 10px;
      line-height: 1.35;
      color: #111;
    }

    .bottom-note a {
      color: #284bcb;
      font-weight: 700;
      text-decoration: none;
    }

    .quantity-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0 0 10px !important;
      font-size: 11px;
      line-height: 1.3;
    }

    .quantity-label {
      font-weight: 700;
      white-space: nowrap;
    }

    .quantity-row input[type="number"] {
      width: 54px;
      height: 28px;
      padding: 0 6px;
      border: 1px solid #9ca4b0;
      border-radius: 4px;
      background: #fff;
      color: #111;
      font: inherit;
      font-size: 11px;
      line-height: 28px;
    }

    .cart-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 4px;
      background: linear-gradient(90deg, #171717 0%, #2a2a2a 50%, #171717 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .03em;
      cursor: pointer;
    }

    /* カートボタン：添付画像に合わせる修正。変更点はアイコンと角丸のみ */
    .order-panel .cart-button.custom-cart-button {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 12px !important;
      width: 100% !important;
      height: 56px !important;
      min-height: 56px !important;
      padding: 0 !important;
      margin: 0 !important;
      border: none !important;
      border-radius: 6px !important;
      background: linear-gradient(90deg, #232323 0%, #2c2c2c 50%, #232323 100%) !important;
      color: #fff !important;
      box-shadow: none !important;
      line-height: 1 !important;
      cursor: pointer !important;
      overflow: hidden !important;
    }

    .order-panel .cart-button.custom-cart-button::before,
    .order-panel .cart-button.custom-cart-button::after {
      content: none !important;
      display: none !important;
    }

    .order-panel .cart-button.custom-cart-button .cart-icon {
      width: 30px !important;
      height: 30px !important;
      flex: 0 0 30px !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      line-height: 0 !important;
      background: transparent !important;
    }

    .order-panel .cart-button.custom-cart-button .cart-icon img {
      display: block !important;
      width: 30px !important;
      height: auto !important;
      background: transparent !important;
    }

    .order-panel .cart-button.custom-cart-button .cart-button-label {
      color: #fff !important;
      font-size: 17px !important;
      font-weight: 700 !important;
      letter-spacing: .04em !important;
      line-height: 1 !important;
      white-space: nowrap !important;
      background: transparent !important;
    }

    @media (max-width: 760px) {
      body {
        padding: 16px;
      }

      .product-detail {
        width: 100%;
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .static-product-image {
        margin: 0 auto;
      }
    }
  </style>
</head>
